<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="iris" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#0099cc"/>
      <stop offset="100%" style="stop-color:#006699"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- 外圈光环 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#iris)" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="url(#iris)" stroke-width="1" opacity="0.2"/>
  
  <!-- 眼睛外轮廓 -->
  <path d="M80,256 Q256,120 432,256 Q256,392 80,256 Z" 
        fill="none" stroke="url(#iris)" stroke-width="6" stroke-linecap="round"
        filter="url(#glow-filter)"/>
  
  <!-- 虹膜 -->
  <circle cx="256" cy="256" r="70" fill="url(#iris)" opacity="0.9"/>
  
  <!-- 瞳孔 -->
  <circle cx="256" cy="256" r="32" fill="#0a0a0a"/>
  
  <!-- 瞳孔高光 -->
  <circle cx="240" cy="240" r="12" fill="#fff" opacity="0.9"/>
  <circle cx="270" cy="270" r="6" fill="#fff" opacity="0.5"/>
  
  <!-- 十字准星 - 横线 -->
  <line x1="180" y1="256" x2="332" y2="256" stroke="#00d4ff" stroke-width="2" opacity="0.6" stroke-dasharray="8,4"/>
  
  <!-- 十字准星 - 竖线 -->
  <line x1="256" y1="180" x2="256" y2="332" stroke="#00d4ff" stroke-width="2" opacity="0.6" stroke-dasharray="8,4"/>
  
  <!-- 扫描线效果 -->
  <line x1="120" y1="200" x2="392" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="312" x2="412" y2="312" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- 四角标记 -->
  <path d="M150,180 L150,160 L170,160" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <path d="M362,160 L362,180 L342,180" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <path d="M150,332 L150,352 L170,352" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <path d="M342,352 L362,352 L362,332" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
</svg>
